<svg xmlns="http://www.w3.org/2000/svg" width="720" height="758" viewBox="0 0 720 758" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'DejaVu Sans Mono', monospace" font-size="13">
<rect width="720" height="758" rx="10" fill="#161b22"/>
<rect width="720" height="34" rx="10" fill="#21262d"/>
