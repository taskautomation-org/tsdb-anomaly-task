<circle cx="21" cy="17" r="6" fill="#ff5f57"/>
<circle cx="41" cy="17" r="6" fill="#febc2e"/>
<circle cx="61" cy="17" r="6" fill="#28c840"/>
<text x="360.0" y="21" fill="#8b949e" font-size="12" text-anchor="middle">tsdb-anomaly-task</text>
<text x="22.0" y="52.0" fill="#7ee787" xml:space="preserve">$ <tspan fill="#e6edf3">python -m tsdb_anomaly_task preview mad --limit 6</tspan></text>
<text x="22.0" y="71.0" fill="#8b949e" xml:space="preserve">task     temperature-mad</text>
<text x="22.0" y="90.0" fill="#8b949e" xml:space="preserve">metric   telemetry/sensor.temperature</text>
<text x="22.0" y="109.0" fill="#8b949e" xml:space="preserve">detector mad(k=3.5, window=6h)</text>
<text x="22.0" y="128.0" fill="#8b949e" xml:space="preserve">schedule every 5m offset 30s</text>
<text x="22.0" y="147.0" fill="#8b949e" xml:space="preserve">output   anomalies/anomaly</text>
<text x="22.0" y="166.0" fill="#8b949e" xml:space="preserve">mode     client</text>
<text x="22.0" y="185.0" fill="#8b949e" xml:space="preserve">reason   a rolling window needs a per-row median, which Flux has no windowed-</text>
<text x="22.0" y="204.0" fill="#8b949e" xml:space="preserve">         quantile primitive for; grouped series need one median scalar per</text>
<text x="22.0" y="223.0" fill="#8b949e" xml:space="preserve">         group, and findRecord extracts a single scalar from a single table;</text>
<text x="22.0" y="242.0" fill="#8b949e" xml:space="preserve">         consecutive-point de-bouncing of a computed score cannot be expressed</text>
<text x="22.0" y="261.0" fill="#8b949e" xml:space="preserve">         with stateCount over a mapped column</text>
<text x="22.0" y="280.0" fill="#d6d9de" xml:space="preserve"></text>
<text x="22.0" y="299.0" fill="#79c0ff" xml:space="preserve">preview: temperature-mad  [mad(k=3.5, window=6h)]</text>
<text x="22.0" y="318.0" fill="#d6d9de" xml:space="preserve">  series 3   points 1560   flags 19   rate 1.22%</text>
<text x="22.0" y="337.0" fill="#d6d9de" xml:space="preserve"></text>
<text x="22.0" y="356.0" fill="#8b949e" xml:space="preserve">  time (UTC)           series                 value     score  severity</text>
<text x="22.0" y="375.0" fill="#8b949e" xml:space="preserve">  ------------------------------------------------------------------------</text>
<text x="22.0" y="394.0" fill="#d6d9de" xml:space="preserve">  2024-03-04 18:25:00  host=edge-02           21.94      4.01  info</text>
<text x="22.0" y="413.0" fill="#d6d9de" xml:space="preserve">  2024-03-04 18:30:00  host=edge-02           22.27      4.33  info</text>
